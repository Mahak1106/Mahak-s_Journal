{% extends 'blog/base.html' %}

{% block title %}Login | Mahak's Journal{% endblock %}

{% block content %}

<section class="hero" style="min-height:100vh;">

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="quote-card" data-aos="zoom-in">

                    <div class="text-center">

                        <div class="profile-circle mb-4"
                             style="width:120px;height:120px;font-size:42px;">

                            MK

                        </div>

                        <span class="welcome-badge">

                            🌸 Welcome Back

                        </span>

                        <h2 class="mt-3">

                            Login to Mahak's Journal

                        </h2>

                        <p class="mb-4">

                            Continue your beautiful journey.

                        </p>

                    </div>
                <form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <input
            type="text"
            name="username"
            class="form-control form-control-lg"
            placeholder="Username"
            required>

    </div>

    <div class="mb-4">

        <input
            type="password"
            name="password"
            class="form-control form-control-lg"
            placeholder="Password"
            required>

    </div>

    <button type="submit" class="btn hero-btn w-100">

        Login

    </button>

</form>

                    <div class="text-center mt-4">

                        <a href="#" class="text-decoration-none">

                            Forgot Password?

                        </a>

                    </div>

                    <hr>

                    <div class="text-center">

                        <p>

                            Don't have an account?

                        </p>

                        <a href="/admin/" class="btn hero-btn-outline">

                            Admin Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
